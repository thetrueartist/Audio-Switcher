name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
      - name: Build
        run: dotnet build AudioSwitcher.csproj -c Release
      - name: Test
        # Dependency-free console suite (pure-logic: signing, config, profile resolution).
        # Non-zero exit fails the build on a regression.
        run: dotnet run --project tests/AudioSwitcher.Tests.csproj -c Release
