name: release

# Push a tag like v1.0.0 to build on a real Windows runner and publish a release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for gh release create (uses the built-in GITHUB_TOKEN)

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained single-file exe: users run it with no .NET install required.
      # Stamp the assembly version from the tag (v1.2.3 -> 1.2.3) so --version / the GUI match.
      - name: Publish (self-contained win-x64)
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          if ($ver -notmatch '^\d+\.\d+') { $ver = '0.0.0' }
          dotnet publish AudioSwitcher.csproj -c Release -r win-x64 `
            --self-contained true -p:PublishSingleFile=true -p:Version=$ver -o publish

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/AudioSwitcher.exe dist/
          # Wildcards so new launchers/scripts are always included automatically.
          Copy-Item *.cmd, *.ps1, README.md, LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath AudioSwitcher-win-x64.zip -Force

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          AudioSwitcher-win-x64.zip
          --title "AudioSwitcher ${{ github.ref_name }}"
          --generate-notes
