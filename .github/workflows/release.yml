name: release

# Push a tag like v1.0.0 to build on a real Windows runner and publish a release.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # for gh release create (uses the built-in GITHUB_TOKEN)

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Self-contained single-file exe: users run it with no .NET install required.
      - name: Publish (self-contained win-x64)
        run: >
          dotnet publish AudioSwitcher.csproj -c Release -r win-x64
          --self-contained true -p:PublishSingleFile=true -o publish

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item publish/AudioSwitcher.exe dist/
          Copy-Item AudioSwitcher.ps1,AudioSwitcher.cmd,Build.cmd,Install.cmd,README.md,LICENSE dist/
          Compress-Archive -Path dist/* -DestinationPath AudioSwitcher-win-x64.zip -Force

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create ${{ github.ref_name }}
          AudioSwitcher-win-x64.zip
          --title "AudioSwitcher ${{ github.ref_name }}"
          --generate-notes
